# LEVIR-CD Dataset Configuration
# Large-scale Expert-Labeled Bi-temporal Dataset

experiment_name: "levircd_5shot"

model:
  in_channels: 3
  backbone_channels: [32, 48, 64]
  ptcf_out_channels: 256
  ptcf_reduction: 4
  num_classes: 2
  decoder_channels: [128, 64, 32]
  input_size: [512, 512]  # Tiled from 1024x1024

meta:
  meta_lr: 0.001
  inner_lr: 0.01
  num_classes: 2
  support_samples: 5
  query_samples: 15
  max_episodes: 8000  # Smaller dataset, fewer episodes
  val_interval: 400
  weight_decay: 0.00001
  gradient_clip: 1.0
  inner_loop_steps: 5

loss:
  focal_alpha: 0.25
  focal_gamma: 2.0
  positive_weight: 25.0  # Higher imbalance
  query_loss_weight: 0.5
  correlation_sparsity_weight: 0.001
  boundary_smoothness_weight: 0.0005
  uncertainty_reg_weight: 0.0002

data:
  data_root: "./data/LEVIR-CD"
  train_split: 0.7
  val_split: 0.15
  test_split: 0.15
  image_size: [512, 512]
  normalize_mean: [0.485, 0.456, 0.406]
  normalize_std: [0.229, 0.224, 0.225]
  rotation_range: [-15.0, 15.0]
  flip_prob: 0.5
  brightness_range: [-0.1, 0.1]
  contrast_range: [-0.1, 0.1]
  noise_std_range: [0.001, 0.005]
  num_workers: 4
  pin_memory: true

training:
  device: "cuda"
  checkpoint_dir: "./checkpoints/levircd"
  save_freq: 800
  log_dir: "./logs/levircd"
  log_freq: 80
  patience: 20
  lr_scheduler: "exponential"
  lr_gamma: 0.9
  lr_step_size: 800
  warmup_episodes: 400
  seed: 42
